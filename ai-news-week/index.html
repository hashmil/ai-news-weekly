<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #1A1A1A;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="60"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="scene-cover"
        class="clip"
        data-composition-id="cover"
        data-composition-src="compositions/cover.html"
        data-start="0"
        data-duration="4"
        data-track-index="1"
      ></div>

      <div
        id="scene-1"
        class="clip"
        data-composition-id="story-1"
        data-composition-src="compositions/story-1.html"
        data-start="4"
        data-duration="10"
        data-track-index="1"
      ></div>

      <div
        id="scene-2"
        class="clip"
        data-composition-id="story-2"
        data-composition-src="compositions/story-2.html"
        data-start="14"
        data-duration="10"
        data-track-index="1"
      ></div>

      <div
        id="scene-3"
        class="clip"
        data-composition-id="story-3"
        data-composition-src="compositions/story-3.html"
        data-start="24"
        data-duration="10"
        data-track-index="1"
      ></div>

      <div
        id="scene-4"
        class="clip"
        data-composition-id="story-4"
        data-composition-src="compositions/story-4.html"
        data-start="34"
        data-duration="10"
        data-track-index="1"
      ></div>

      <div
        id="scene-5"
        class="clip"
        data-composition-id="story-5"
        data-composition-src="compositions/story-5.html"
        data-start="44"
        data-duration="10"
        data-track-index="1"
      ></div>

      <div
        id="scene-outro"
        class="clip"
        data-composition-id="outro"
        data-composition-src="compositions/outro.html"
        data-start="54"
        data-duration="6"
        data-track-index="1"
      ></div>

      <div
        id="captions"
        class="clip"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="60"
        data-track-index="3"
      ></div>

      <audio
        id="voice"
        class="clip"
        data-start="0"
        data-duration="60"
        data-track-index="2"
        src="media/voice.mp3"
        data-volume="1"
      ></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // Root timeline is empty — scenes have their own nested timelines via sub-compositions.
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
