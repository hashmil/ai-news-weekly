    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const root = document.querySelector('[data-composition-id="story-3"]');
        const qa = (s) => Array.from(root.querySelectorAll(s));

        qa('[data-split]').forEach(el => {
          const txt = el.textContent;
          el.textContent = '';
          for (const ch of txt) {
            const s = document.createElement('span');
            s.className = 'chr';
            s.textContent = ch === ' ' ? '\u00A0' : ch;
            el.appendChild(s);
          }
        });

        const tl = gsap.timeline({ paused: true });

        // Wipe (ink, from right)
        tl.to('.s3-wipe', { scaleX: 0, duration: 0.52, ease: 'power4.inOut' }, 0);
        tl.set('.s3-wipe', { display: 'none' }, 0.52);

        tl.from('.s3-meta-l', { x: -40, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.32);
        tl.from('.s3-meta-r', { x: 40, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.38);
        tl.fromTo('.s3-ink-bar', { scaleX: 0, transformOrigin: 'right center' }, { scaleX: 1, duration: 0.6, ease: 'expo.out' }, 0.25);

        tl.from('.s3-tag', { x: -30, rotation: -6, opacity: 0, duration: 0.5, ease: 'back.out(2)' }, 0.45);

        tl.from('.s3-h-bold .chr', { y: 70, rotation: 3, opacity: 0, duration: 0.5, ease: 'back.out(2)', stagger: 0.02 }, 0.55);
        tl.from('.s3-h-italic .chr', { x: 40, opacity: 0, duration: 0.4, ease: 'power3.out', stagger: 0.018 }, 0.85);
        tl.from('.s3-h-bold2 .chr', { y: 80, scale: 1.4, opacity: 0, duration: 0.5, ease: 'back.out(2.4)', stagger: 0.04 }, 1.05);

        tl.from('.s3-path', { x: -30, opacity: 0, duration: 0.45, ease: 'power2.out' }, 1.3);

        // Image band
        tl.fromTo('.s3-photo', { clipPath: 'inset(0 100% 0 0)' }, { clipPath: 'inset(0 0% 0 0)', duration: 0.55, ease: 'power3.out' }, 1.05);
        tl.from('.s3-photo-wrap', { y: 20, duration: 0.5, ease: 'power3.out' }, 1.05);
        tl.from('.s3-photo-caption', { y: 8, opacity: 0, duration: 0.3, ease: 'power2.out' }, 1.45);

        tl.from('.s3-metric-label', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, 1.6);
        tl.from('.s3-metric .chr', { y: 60, scale: 1.2, opacity: 0, duration: 0.5, ease: 'back.out(2)', stagger: 0.035 }, 1.7);
        tl.from('.s3-sub-word', { y: 20, scale: 0.6, opacity: 0, duration: 0.4, ease: 'back.out(2.4)', stagger: 0.1 }, 2.1);
        tl.from('.s3-sub-sep', { scale: 0, opacity: 0, duration: 0.3, ease: 'back.out(2)', stagger: 0.1 }, 2.15);

        tl.fromTo('.s3-callout-stripe', { scaleY: 0 }, { scaleY: 1, duration: 0.45, ease: 'power3.out' }, 2.35);
        tl.from('.s3-callout', { x: -30, opacity: 0, duration: 0.5, ease: 'power3.out' }, 2.4);
        tl.from('.s3-callout-label', { y: 14, opacity: 0, duration: 0.35, ease: 'power2.out' }, 2.6);
        tl.from('.s3-callout-body', { y: 18, opacity: 0, duration: 0.45, ease: 'power2.out' }, 2.7);

        tl.from('.s3-dots .s3-d', { scale: 0, opacity: 0, duration: 0.3, ease: 'back.out(2.4)', stagger: 0.05 }, 2.85);
        tl.from('.s3-counter', { x: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, 2.95);

        // BG patterns
        tl.fromTo('.s3-bg-halftone', { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.25);
        tl.to('.s3-bg-halftone', { x: -36, y: -36, duration: 14, ease: 'none' }, 0);
        tl.fromTo('.s3-bg-ticker', { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.3);
        tl.to('.s3-bg-ticker', { y: -140, duration: 9, ease: 'none' }, 0);

        tl.fromTo('.s3-ghost', { opacity: 0, y: 30, scale: 0.95 }, { opacity: 0.13, y: 0, scale: 1, duration: 1.3, ease: 'power2.out' }, 0.3);
        tl.to('.s3-ghost', { y: -25, rotation: -1, duration: 7, ease: 'sine.inOut' }, 1.7);
        tl.to('.s3-ink-bar', { scaleX: 1.15, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 1.5);

        tl.set('[data-composition-id="story-3"]', { opacity: 0, visibility: 'hidden' }, 10.0);

        window.__timelines['story-3'] = tl;
