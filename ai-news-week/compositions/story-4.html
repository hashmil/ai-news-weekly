    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const root = document.querySelector('[data-composition-id="story-4"]');
        const q = (s) => root.querySelector(s);
        const qa = (s) => Array.from(root.querySelectorAll(s));

        qa('[data-split]').forEach(el => {
          const txt = el.textContent;
          el.textContent = '';
          for (const ch of txt) {
            const s = document.createElement('span');
            s.className = 'chr';
            s.textContent = ch === ' ' ? '\u00A0' : ch;
            el.appendChild(s);
          }
        });

        const tl = gsap.timeline({ paused: true });

        // Wipe (vermillion, from left)
        tl.to('.s4-wipe', { scaleX: 0, duration: 0.52, ease: 'power4.inOut' }, 0);
        tl.set('.s4-wipe', { display: 'none' }, 0.52);

        tl.from('.s4-meta-l', { x: -40, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.32);
        tl.from('.s4-meta-r', { x: 40, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.38);
        tl.fromTo('.s4-forest-stripe', { scaleX: 0 }, { scaleX: 1, duration: 0.6, ease: 'expo.out' }, 0.25);
        tl.fromTo('.s4-electric-dot', { scale: 0, opacity: 0 }, { scale: 1, opacity: 0.5, duration: 0.55, ease: 'back.out(2.4)' }, 0.4);

        tl.from('.s4-tag', { x: -30, rotation: -6, opacity: 0, duration: 0.5, ease: 'back.out(2)' }, 0.45);

        tl.from('.s4-h-bold .chr', { y: 70, rotation: 3, opacity: 0, duration: 0.5, ease: 'back.out(2)', stagger: 0.02 }, 0.55);
        tl.from('.s4-h-italic .chr', { y: 30, opacity: 0, duration: 0.4, ease: 'power3.out', stagger: 0.015 }, 0.85);
        tl.from('.s4-h-bold2 .chr', { y: 80, scale: 1.4, opacity: 0, duration: 0.5, ease: 'back.out(2.4)', stagger: 0.04 }, 1.1);

        tl.from('.s4-path', { x: -30, opacity: 0, duration: 0.45, ease: 'power2.out' }, 1.35);

        // Circular portal — scale + rotate in
        tl.fromTo('.s4-photo-wrap', { scale: 0.2, opacity: 0, rotation: -20 }, { scale: 1, opacity: 1, rotation: 0, duration: 0.9, ease: 'back.out(1.8)' }, 0.85);
        tl.fromTo('.s4-photo', { scale: 1.3 }, { scale: 1, duration: 1.2, ease: 'power2.out' }, 0.85);
        tl.from('.s4-photo-caption', { x: 20, opacity: 0, duration: 0.35, ease: 'power2.out' }, 1.55);

        // Big number count-up
        const num = q('#s4-num');
        const counter = { val: 0 };
        tl.fromTo(num, { scale: 0.4, opacity: 0, rotation: -4 }, { scale: 1.1, opacity: 1, rotation: 0, duration: 0.55, ease: 'back.out(2.4)' }, 1.65);
        tl.to(counter, {
          val: 3.5,
          duration: 1.1,
          ease: 'power3.out',
          onUpdate: () => { num.textContent = counter.val.toFixed(1); }
        }, 1.65);
        tl.to(num, { scale: 1, duration: 0.4, ease: 'power2.out' }, 2.2);

        tl.from('.s4-metric-unit', { x: -20, opacity: 0, duration: 0.45, ease: 'back.out(2)' }, 1.95);
        tl.from('.s4-metric-tag', { x: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, 2.1);

        tl.fromTo('.s4-callout-stripe', { scaleY: 0 }, { scaleY: 1, duration: 0.45, ease: 'power3.out' }, 2.35);
        tl.from('.s4-callout', { x: -30, opacity: 0, duration: 0.5, ease: 'power3.out' }, 2.4);
        tl.from('.s4-callout-label', { y: 14, opacity: 0, duration: 0.35, ease: 'power2.out' }, 2.6);
        tl.from('.s4-callout-body', { y: 18, opacity: 0, duration: 0.45, ease: 'power2.out' }, 2.7);

        tl.from('.s4-dots .s4-d', { scale: 0, opacity: 0, duration: 0.3, ease: 'back.out(2.4)', stagger: 0.05 }, 2.85);
        tl.from('.s4-counter', { x: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, 2.95);

        // BG patterns
        tl.fromTo('.s4-bg-halftone', { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out', overwrite: 'auto' }, 0.25);
        tl.to('.s4-bg-halftone', { x: 34, y: -34, duration: 14, ease: 'none' }, 0);
        tl.fromTo('.s4-bg-contours', { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out', overwrite: 'auto' }, 0.3);
        tl.to('.s4-bg-contours', { y: 48, duration: 12, ease: 'none' }, 0);

        tl.fromTo('.s4-ghost', { opacity: 0, x: 40, scale: 0.95 }, { opacity: 0.1, x: 0, scale: 1, duration: 1.4, ease: 'power2.out' }, 0.3);
        tl.to('.s4-ghost', { x: -25, rotation: 1, duration: 7, ease: 'sine.inOut' }, 1.3);
        tl.to('.s4-forest-stripe', { scaleX: 1.3, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 1.5);
        tl.to('.s4-electric-dot', { scale: 1.15, duration: 1.6, ease: 'sine.inOut', yoyo: true, repeat: 2 }, 1.5);
        tl.to('.s4-d-on', { scale: 1.3, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 4 }, 3.2);
        tl.to('.s4-dot', { scale: 1.35, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 3 }, 3.5);

        tl.to('[data-composition-id="story-4"]', { opacity: 0, duration: 0.18, ease: 'power2.in' }, 9.82);
        tl.set('[data-composition-id="story-4"]', { opacity: 0, visibility: 'hidden' }, 10.0);

        window.__timelines['story-4'] = tl;
      })();
    </script>
