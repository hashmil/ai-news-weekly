    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const root = document.querySelector('[data-composition-id="story-2"]');
        const q = (s) => root.querySelector(s);
        const qa = (s) => Array.from(root.querySelectorAll(s));

        qa('[data-split]').forEach(el => {
          const txt = el.textContent;
          el.textContent = '';
          for (const ch of txt) {
            const s = document.createElement('span');
            s.className = 'chr';
            s.textContent = ch === ' ' ? '\u00A0' : ch;
            el.appendChild(s);
          }
        });

        const tl = gsap.timeline({ paused: true });

        // Wipe (saffron, from left)
        tl.to('.s2-wipe', { scaleX: 0, duration: 0.52, ease: 'power4.inOut' }, 0);
        tl.set('.s2-wipe', { display: 'none' }, 0.52);

        // Meta top
        tl.from('.s2-meta-l', { x: -40, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.32);
        tl.from('.s2-meta-r', { x: 40, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.38);

        // Saffron line
        tl.fromTo('.s2-saffron-line', { scaleX: 0, transformOrigin: 'left center' }, { scaleX: 1, duration: 0.6, ease: 'expo.out' }, 0.25);

        // Tag
        tl.from('.s2-tag', { x: -30, rotation: -6, opacity: 0, duration: 0.5, ease: 'back.out(2)' }, 0.45);

        // Headline stagger
        tl.from('.s2-h-italic .chr', { x: -20, opacity: 0, duration: 0.35, ease: 'power2.out', stagger: 0.018 }, 0.55);
        tl.from('.s2-h-bold .chr', { y: 70, rotation: 3, opacity: 0, duration: 0.5, ease: 'back.out(2)', stagger: 0.025 }, 0.75);
        tl.from('.s2-h-bold2 .chr', { y: 80, scale: 1.4, opacity: 0, duration: 0.5, ease: 'back.out(2.4)', stagger: 0.03 }, 1.0);

        // Path
        tl.from('.s2-path', { x: -30, opacity: 0, duration: 0.45, ease: 'power2.out' }, 1.3);

        // Metric
        // Atmospheric photo — very slow Ken Burns zoom
        tl.fromTo('.s2-photo-atmos', { scale: 1.05, opacity: 0 }, { scale: 1, opacity: 0.9, duration: 1.6, ease: 'power2.out' }, 0.2);
        tl.to('.s2-photo-atmos', { scale: 1.08, duration: 10, ease: 'none' }, 0.5);
        tl.fromTo('.s2-photo-vignette', { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.4);

        tl.from('.s2-metric-label', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, 1.6);
        tl.from('.s2-m-word', { y: 40, scale: 0.5, opacity: 0, duration: 0.45, ease: 'back.out(2.4)', stagger: 0.12 }, 1.7);
        tl.from('.s2-m-sep', { scale: 0, opacity: 0, duration: 0.3, ease: 'back.out(2)', stagger: 0.12 }, 1.78);
        tl.from('.s2-metric-tag', { x: 30, opacity: 0, duration: 0.4, ease: 'power2.out' }, 2.15);

        // Callout
        tl.fromTo('.s2-callout-stripe', { scaleY: 0 }, { scaleY: 1, duration: 0.45, ease: 'power3.out' }, 2.3);
        tl.from('.s2-callout', { x: -30, opacity: 0, duration: 0.5, ease: 'power3.out' }, 2.35);
        tl.from('.s2-callout-label', { y: 14, opacity: 0, duration: 0.35, ease: 'power2.out' }, 2.55);
        tl.from('.s2-callout-body', { y: 18, opacity: 0, duration: 0.45, ease: 'power2.out' }, 2.65);

        // Foot
        tl.from('.s2-dots .s2-d', { scale: 0, opacity: 0, duration: 0.3, ease: 'back.out(2.4)', stagger: 0.05 }, 2.8);
        tl.from('.s2-counter', { x: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, 2.9);

        // Ambient
        // BG patterns
        tl.fromTo('.s2-bg-halftone', { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.25);
        tl.to('.s2-bg-halftone', { x: 34, y: 34, duration: 14, ease: 'none' }, 0);
        tl.fromTo('.s2-bg-diagonal', { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.3);
        tl.to('.s2-bg-diagonal', { x: -54, y: -54, duration: 14, ease: 'none' }, 0);

        tl.fromTo('.s2-ghost', { opacity: 0, x: 40, scale: 0.95 }, { opacity: 0.1, x: 0, scale: 1, duration: 1.4, ease: 'power2.out' }, 0.3);
        tl.to('.s2-ghost', { x: -25, rotation: 1, duration: 7, ease: 'sine.inOut' }, 1.8);
        tl.fromTo('.s2-mauve', { scale: 0.85, opacity: 0 }, { scale: 1, opacity: 0.35, duration: 1.0, ease: 'power2.out' }, 0.3);
        tl.to('.s2-mauve', { scale: 1.1, duration: 2.8, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 1.5);
        tl.to('.s2-m-word', { y: -6, duration: 1.2, ease: 'sine.inOut', yoyo: true, repeat: 2, stagger: 0.1 }, 3.5);
        tl.to('.s2-d-on', { scale: 1.25, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 4 }, 3.2);

        tl.to('[data-composition-id="story-2"]', { opacity: 0, duration: 0.18, ease: 'power2.in' }, 9.82);
        tl.set('[data-composition-id="story-2"]', { opacity: 0, visibility: 'hidden' }, 10.0);

        window.__timelines['story-2'] = tl;
      })();
